spring.application.name=electronique

# Connexion MySQL (root / 1234)
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Upload configuration
upload.path=src/main/resources/static/images/
upload.url=/images/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB