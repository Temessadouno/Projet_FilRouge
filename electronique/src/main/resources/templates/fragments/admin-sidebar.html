<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ======================================================== -->
<!-- ASIDE BARRE DE NAVIGATION ADMIN GÉNÉRIQUE -->
<!-- ======================================================== -->
<div th:fragment="admin-sidebar" class="w-64 min-h-screen bg-white border-r border-gray-200 fixed left-0 top-16 overflow-y-auto z-40">
  <div class="p-5">
    
    <!-- Profil admin -->
    <div class="flex items-center gap-3 mb-8 pb-4 border-b border-gray-200">
      <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center">
        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </div>
      <div>
        <p class="text-sm font-bold text-gray-900">Panel Admin</p>
        <p class="text-xs text-gray-500">Gestion complète</p>
      </div>
    </div>
    
    <!-- Navigation -->
    <nav class="space-y-1">
      
      <!-- Dashboard -->
      <a th:href="@{/admin}" 
         class="nav-admin-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all"
         th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/admin') and !#strings.contains(#httpServletRequest.requestURI, '/admin/produits') and !#strings.contains(#httpServletRequest.requestURI, '/admin/categories') and !#strings.contains(#httpServletRequest.requestURI, '/admin/commandes') and !#strings.contains(#httpServletRequest.requestURI, '/admin/clients')} ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Tableau de bord
      </a>
      
      <!-- Produits -->
      <a th:href="@{/admin/produits}" 
         class="nav-admin-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all"
         th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/admin/produits')} ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
        Produits
      </a>
      
      <!-- Catégories -->
      <a th:href="@{/admin/categories}" 
         class="nav-admin-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all"
         th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/admin/categories')} ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
        </svg>
        Catégories
      </a>
      
      <!-- Commandes -->
      <a th:href="@{/admin/commandes}" 
         class="nav-admin-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all"
         th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/admin/commandes')} ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
        </svg>
        Commandes
      </a>
      
      <!-- Clients -->
      <a th:href="@{/admin/clients}" 
         class="nav-admin-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all"
         th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/admin/clients')} ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        Clients
      </a>
      
    </nav>
    
    <!-- Séparateur -->
    <div class="my-6 border-t border-gray-200"></div>
    
    <!-- Retour au site -->
    <a th:href="@{/}" 
       class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-all">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      Retour au site
    </a>
  </div>
</div>
</html>
