<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      data-theme="dark">

<head th:fragment="head">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${pageTitle ?: 'AQL Commerce'}">AQL Commerce</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: ['attribute', '[data-theme="dark"]'],
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#2563eb', dark: '#1a4fa0', light: '#3b82f6', muted: 'rgba(37,99,235,0.1)' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #0a0a0a;
      --surface: #0d0d0d;
      --card:    #0f0f0f;
      --nav:     #0f0f0f;
      --border:  #1e1e1e;
      --border2: #2a2a2a;
      --input:   #111111;
      --badge:   #131313;
      --text:    #f0f0f0;
      --muted:   #555555;
      --accent:  #2563eb;
      --accent-light: #3b82f6;
      --accent-hover: #1a4fa0;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }

    /* Flash messages */
    .flash-msg { animation: flash-in .25s ease; }
    @keyframes flash-in { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

    /* Focus ring */
    input:focus, textarea:focus, select:focus, button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

    @media print {
      nav, .no-print { display: none !important; }
      body { background: white !important; color: black !important; }
    }
  </style>
</head>

<body>
<!--/*  ─────────────────────────────────────────────────
        NAVBAR FRAGMENT
    ───────────────────────────────────────────────── */-->
<nav th:fragment="navbar"
     class="sticky top-0 z-50"
     style="background: var(--nav); border-bottom: 1px solid var(--border);">
  <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between gap-6">

    <!-- Logo -->
    <a th:href="@{/}" class="flex items-center gap-2.5 flex-shrink-0">
      <span class="w-2 h-2 rounded-full" style="background: var(--accent-light);"></span>
      <span class="text-base font-bold tracking-tight text-black">E-Commerce</span>
    </a>

    <!-- Links -->
    <div class="flex items-center gap-6">
      <a th:href="@{/produits}"
         class="text-sm font-medium transition-colors"
         style="color: var(--muted);"
         onmouseover="this.style.color='#f0f0f0'"
         onmouseout="this.style.color='var(--muted)'">
        Produits
      </a>

      <sec:authorize access="hasRole('ADMIN')">
        <a th:href="@{/admin}"
           class="text-sm font-medium transition-colors"
           style="color: var(--muted);"
           onmouseover="this.style.color='#f0f0f0'"
           onmouseout="this.style.color='var(--muted)'">
          Admin
        </a>
      </sec:authorize>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-3">

      <!-- Panier (clients connectés) -->
      <sec:authorize access="hasRole('CLIENT')">
        <a th:href="@{/panier}"
           class="relative flex items-center gap-2 px-3.5 py-1.5 rounded-lg text-sm font-semibold transition-opacity hover:opacity-80"
           style="background: rgba(37,99,235,0.12); border: 1px solid rgba(37,99,235,0.25); color: var(--accent-light);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          Panier
          <span th:text="${nombreArticles ?: 0}"
                class="text-xs font-bold px-1.5 py-0.5 rounded-full"
                style="background: var(--accent); color: #fff; font-size: 10px; min-width: 18px; text-align: center;">0</span>
        </a>
      </sec:authorize>

      <!-- Déconnexion si connecté -->
      <sec:authorize access="isAuthenticated">
        <form th:action="@{/auth/logout}" method="post" class="inline">
          <button type="submit"
                  class="px-3.5 py-1.5 rounded-lg text-sm font-medium transition-opacity hover:opacity-70 cursor-pointer"
                  style="background: transparent; border: 1px solid var(--border2); color: var(--muted);">
            Déconnexion
          </button>
        </form>
      </sec:authorize>

      <!-- Connexion si non connecté -->
      <sec:authorize access="isAnonymous()">
        <a th:href="@{/auth/login}"
           class="px-4 py-1.5 rounded-lg text-sm font-semibold transition-opacity hover:opacity-80"
           style="background: var(--accent); color: #fff;">
          Connexion
        </a>
      </sec:authorize>
    </div>

  </div>
</nav>

<script th:fragment="scripts">
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
</script>
</body>
</html>
