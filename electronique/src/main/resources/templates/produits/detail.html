<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      data-theme="dark">
<head th:replace="~{fragments/layout :: head}"></head>
<body style="background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif;">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="max-w-5xl mx-auto px-4 py-10">
  <a th:href="@{/produits}" class="inline-flex items-center gap-1 text-sm mb-8 hover:opacity-70 transition"
     style="color: var(--muted);">← Retour aux produits</a>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
    <!-- Image -->
    <div class="rounded-2xl overflow-hidden" style="background: var(--card); border: 1px solid var(--border);">
      <img th:src="${produit.imageUrl}" th:alt="${produit.nom}"
           onerror="this.src='/images/placeholder.png'"
           class="w-full object-cover" style="height: 420px;"/>
    </div>

    <!-- Infos -->
    <div class="flex flex-col gap-5">
      <div>
        <span class="text-xs font-semibold px-3 py-1 rounded-full"
              style="background: var(--badge); color: var(--accent);"
              th:text="${produit.categorie.nom}"></span>
        <h1 class="mt-3 text-3xl font-extrabold leading-tight" th:text="${produit.nom}"></h1>
        <p class="text-sm mt-1" style="color: var(--muted);"
           th:text="'Marque : ' + ${produit.marque}"></p>
      </div>

      <p class="text-sm leading-relaxed" style="color: var(--muted);" th:text="${produit.description}"></p>

      <div class="flex items-center gap-4 py-4 border-t border-b" style="border-color: var(--border);">
        <span class="text-4xl font-extrabold" style="color: var(--accent);"
              th:text="${#numbers.formatDecimal(produit.prix,1,2)} + ' MAD'"></span>
        <span th:if="${produit.enStock}"
              class="text-sm font-bold px-3 py-1 rounded-full" style="background: #dcfce7; color: #166534;"
              th:text="'✓ En stock (' + ${produit.stock} + ' disponibles)'"></span>
        <span th:unless="${produit.enStock}"
              class="text-sm font-bold px-3 py-1 rounded-full" style="background: #fee2e2; color: #991b1b;">
          ✕ Rupture de stock
        </span>
      </div>

      <!-- Formulaire ajout panier -->
      <sec:authorize access="hasRole('CLIENT')">
        <form th:action="@{/panier/ajouter}" method="post" th:if="${produit.enStock}" class="flex flex-col gap-3">
          <input type="hidden" name="produitId" th:value="${produit.id}"/>
          <div class="flex items-center gap-3">
            <label class="text-sm font-medium" style="color: var(--muted);">Quantité :</label>
            <input type="number" name="quantite" value="1" min="1" th:max="${produit.stock}"
                   class="w-20 px-3 py-2 rounded-lg border text-center font-bold text-sm outline-none focus:ring-2"
                   style="background: var(--input); border-color: var(--border); color: var(--text);"/>
          </div>
          <button type="submit"
                  class="w-full py-3 rounded-xl font-bold text-black text-base transition hover:opacity-80 hover:scale-[1.01]"
                  style="background: var(--accent);">
            🛍 Ajouter au panier
          </button>
        </form>
      </sec:authorize>

      <sec:authorize access="!isAuthenticated()">
        <div class="rounded-xl p-4 text-sm" style="background: var(--card); border: 1px solid var(--border);">
          <a th:href="@{/auth/login}" class="font-bold" style="color: var(--accent);">Connectez-vous</a>
          <span style="color: var(--muted);"> pour ajouter ce produit au panier</span>
        </div>
      </sec:authorize>

      <sec:authorize access="hasRole('ADMIN')">
        <a th:href="@{/admin/produits/editer/{id}(id=${produit.id})}"
           class="w-full text-center py-3 rounded-xl font-bold text-sm border transition hover:opacity-70"
           style="border-color: var(--border); color: var(--text);">
          ✏️ Modifier ce produit (Admin)
        </a>
      </sec:authorize>
    </div>
  </div>
</main>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
