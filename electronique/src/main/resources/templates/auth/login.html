<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="min-h-screen flex items-center justify-center px-4"
      style="background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif;">

<div class="w-full max-w-sm">
  <!-- Logo -->
  <div class="text-center mb-8">
    <a href="/" class="text-3xl font-extrabold" style="color: var(--accent);">🛒 AQL Commerce</a>
    <p class="text-sm mt-2" style="color: var(--muted);">Connectez-vous à votre compte</p>
  </div>

  <div class="rounded-2xl border p-8" style="background: var(--card); border-color: var(--border);">
    <h1 class="text-2xl font-extrabold mb-6 text-center">Connexion</h1>

    <!-- Alertes -->
    <div th:if="${erreur}" class="flash-msg mb-5 px-4 py-3 rounded-xl text-sm font-medium"
         style="background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5;" th:text="${erreur}"></div>
    <div th:if="${message}" class="flash-msg mb-5 px-4 py-3 rounded-xl text-sm font-medium"
         style="background: #dcfce7; color: #166534; border: 1px solid #86efac;" th:text="${message}"></div>

    <form th:action="@{/auth/login}" method="post" class="flex flex-col gap-4">
      <div>
        <label class="block text-xs font-semibold mb-1.5 uppercase tracking-wide"
               style="color: var(--muted);">Email</label>
        <input type="email" name="username" required placeholder="votre@email.com" autofocus
               class="w-full px-4 py-3 rounded-xl border text-sm outline-none focus:ring-2 transition"
               style="background: var(--input); border-color: var(--border); color: var(--text);"/>
      </div>
      <div>
        <label class="block text-xs font-semibold mb-1.5 uppercase tracking-wide"
               style="color: var(--muted);">Mot de passe</label>
        <input type="password" name="password" required placeholder="••••••••"
               class="w-full px-4 py-3 rounded-xl border text-sm outline-none focus:ring-2 transition"
               style="background: var(--input); border-color: var(--border); color: var(--text);"/>
      </div>
      <button type="submit"
              class="w-full py-3 rounded-xl font-bold text-black text-base mt-2 transition hover:opacity-80 hover:scale-[1.01]"
              style="background: var(--accent);">
        Se connecter →
      </button>
    </form>

    <p class="text-center text-sm mt-5" style="color: var(--muted);">
      Pas encore de compte ?
      <a th:href="@{/auth/register}" class="font-bold" style="color: var(--accent);">S'inscrire</a>
    </p>
  </div>

  <div class="text-center mt-4">
    <button onclick="toggleTheme()" class="text-xs hover:opacity-70 transition" style="color: var(--muted);">
      ◑ Changer le thème
    </button>
  </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
