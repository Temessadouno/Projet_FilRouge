<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head th:replace="~{fragments/layout :: head}"></head>
<body style="background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif;">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="max-w-4xl mx-auto px-4 py-10">
  <div class="flex items-center gap-3 mb-6">
    <a th:href="@{/admin}" class="text-sm hover:opacity-70" style="color: var(--muted);">← Dashboard</a>
    <h1 class="text-2xl font-extrabold">🗂 Catégories</h1>
  </div>

  <!-- Flash -->
  <div th:if="${success}" class="flash-msg mb-4 px-4 py-3 rounded-xl text-sm"
       style="background: #dcfce7; color: #166534; border: 1px solid #86efac;" th:text="${success}"></div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <!-- Liste -->
    <div class="rounded-2xl border overflow-hidden" style="background: var(--card); border-color: var(--border);">
      <div class="px-5 py-4 font-bold text-sm border-b" style="background: var(--badge); border-color: var(--border);">
        Liste des catégories (<span th:text="${#lists.size(categories)}"></span>)
      </div>
      <div th:if="${#lists.isEmpty(categories)}" class="px-5 py-8 text-center text-sm" style="color: var(--muted);">
        Aucune catégorie créée
      </div>
      <div th:each="cat : ${categories}"
           class="flex items-center justify-between px-5 py-3 border-b last:border-b-0"
           style="border-color: var(--border);">
        <div>
          <p class="font-semibold text-sm" th:text="${cat.nom}"></p>
          <p class="text-xs" style="color: var(--muted);" th:text="${cat.description}"></p>
        </div>
        <div class="flex gap-2">
          <form th:action="@{/admin/categories/supprimer/{id}(id=${cat.id})}" method="post"
                onsubmit="return confirm('Supprimer cette catégorie ?')">
            <button type="submit"
                    class="px-3 py-1.5 rounded-lg text-xs font-medium text-white transition hover:opacity-80"
                    style="background: #ef4444;">Suppr.</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Formulaire ajout/édition -->
    <div class="rounded-2xl border p-6" style="background: var(--card); border-color: var(--border);">
      <h2 class="font-bold text-base mb-5">+ Nouvelle catégorie</h2>
      <form th:action="@{/admin/categories/sauvegarder}" method="post" class="flex flex-col gap-4">
        <input type="hidden" name="id" th:value="${categorie.id}"/>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wide mb-1.5" style="color: var(--muted);">Nom *</label>
          <input type="text" name="nom" required th:value="${categorie.nom}" placeholder="Nom de la catégorie"
                 class="w-full px-4 py-3 rounded-xl border text-sm outline-none focus:ring-2 transition"
                 style="background: var(--input); border-color: var(--border); color: var(--text);"/>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wide mb-1.5" style="color: var(--muted);">Description</label>
          <textarea name="description" rows="3" th:text="${categorie.description}" placeholder="Description..."
                    class="w-full px-4 py-3 rounded-xl border text-sm outline-none resize-none focus:ring-2 transition"
                    style="background: var(--input); border-color: var(--border); color: var(--text);"></textarea>
        </div>
        <button type="submit"
                class="w-full py-3 rounded-xl font-bold text-black transition hover:opacity-80"
                style="background: var(--accent);">💾 Sauvegarder</button>
      </form>
    </div>
  </div>
</main>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
