<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head th:replace="~{fragments/layout :: head}"></head>
<body style="background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif;">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="max-w-6xl mx-auto px-4 py-10">
  <div class="flex items-center gap-3 mb-6">
    <a th:href="@{/admin}" class="text-sm hover:opacity-70" style="color: var(--muted);">← Dashboard</a>
    <h1 class="text-2xl font-extrabold">📋 Toutes les commandes</h1>
  </div>

  <!-- Flash -->
  <div th:if="${success}" class="flash-msg mb-4 px-4 py-3 rounded-xl text-sm"
       style="background: #dcfce7; color: #166534; border: 1px solid #86efac;" th:text="${success}"></div>

  <div class="rounded-2xl border overflow-hidden" style="background: var(--card); border-color: var(--border);">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-xs uppercase tracking-wider text-left"
            style="background: var(--badge); color: var(--muted);">
          <th class="px-5 py-3">#</th>
          <th class="px-5 py-3">Client</th>
          <th class="px-5 py-3">Articles</th>
          <th class="px-5 py-3">Total</th>
          <th class="px-5 py-3">Statut</th>
          <th class="px-5 py-3">Date</th>
          <th class="px-5 py-3">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="cmd : ${commandes}"
            class="border-t hover:opacity-90 transition" style="border-color: var(--border);">
          <td class="px-5 py-3 font-bold" style="color: var(--accent);"
              th:text="'#' + ${cmd.id}"></td>
          <td class="px-5 py-3">
            <p class="font-semibold" th:text="${cmd.client.nomComplet}"></p>
            <p class="text-xs" style="color: var(--muted);" th:text="${cmd.client.email}"></p>
          </td>
          <td class="px-5 py-3">
            <div class="flex flex-wrap gap-1">
              <span th:each="ligne : ${cmd.lignes}"
                    class="text-xs px-2 py-0.5 rounded-md"
                    style="background: var(--badge); color: var(--muted);"
                    th:text="${ligne.produit.nom} + ' ×' + ${ligne.quantite}"></span>
            </div>
          </td>
          <td class="px-5 py-3 font-bold" style="color: var(--accent);"
              th:text="${#numbers.formatDecimal(cmd.total,1,2)} + ' MAD'"></td>
          <td class="px-5 py-3">
            <span class="px-2 py-0.5 rounded-full text-xs font-bold"
                  th:text="${cmd.statut}"
                  th:classappend="${cmd.statut.toString() == 'VALIDEE' ? ' st-validee' : (cmd.statut.toString() == 'ANNULEE' ? ' st-annulee' : ' st-encours')}">
            </span>
          </td>
          <td class="px-5 py-3 text-xs" style="color: var(--muted);"
              th:text="${#temporals.format(cmd.dateCommande,'dd/MM/yyyy HH:mm')}"></td>
          <td class="px-5 py-3">
            <form th:action="@{/admin/commandes/{id}/statut(id=${cmd.id})}" method="post" class="flex gap-2 items-center">
              <select name="statut"
                      class="px-2 py-1.5 rounded-lg border text-xs outline-none"
                      style="background: var(--input); border-color: var(--border); color: var(--text);">
                <option value="EN_COURS" th:selected="${cmd.statut.toString() == 'EN_COURS'}">EN_COURS</option>
                <option value="VALIDEE"  th:selected="${cmd.statut.toString() == 'VALIDEE'}">VALIDEE</option>
                <option value="ANNULEE"  th:selected="${cmd.statut.toString() == 'ANNULEE'}">ANNULEE</option>
              </select>
              <button type="submit"
                      class="px-3 py-1.5 rounded-lg text-xs font-bold text-black transition hover:opacity-80"
                      style="background: var(--accent);">✓</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <style>
    .st-encours { background: #fef3c7; color: #92400e; }
    .st-validee { background: #dcfce7; color: #166534; }
    .st-annulee { background: #fee2e2; color: #991b1b; }
  </style>
</main>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
