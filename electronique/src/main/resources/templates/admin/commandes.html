<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-gray-50 text-gray-900 font-['Inter',system-ui]">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex">
  
  <!-- ASIDE BARRE DE NAVIGATION ADMIN -->
  <aside class="w-64 min-h-screen bg-white border-r border-gray-200 fixed left-0 top-16 overflow-y-auto z-40">
    <div class="p-5">
      <div class="flex items-center gap-3 mb-8 pb-4 border-b border-gray-200">
        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center">
          <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <div>
          <p class="text-sm font-bold text-gray-900">Panel Admin</p>
          <p class="text-xs text-gray-500">Gestion complète</p>
        </div>
      </div>
      
      <nav class="space-y-1">
        <a th:href="@{/admin}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Tableau de bord
        </a>
        
        <a th:href="@{/admin/produits}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
          </svg>
          Produits
        </a>
        
        <a th:href="@{/admin/categories}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
          </svg>
          Catégories
        </a>
        
        <a th:href="@{/admin/commandes}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium bg-blue-50 text-blue-700 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
          </svg>
          Commandes
        </a>
        
        <a th:href="@{/admin/clients}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          Clients
        </a>
      </nav>
      
      <div class="mt-8 pt-4 border-t border-gray-200">
        <a th:href="@{/}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Retour au site
        </a>
      </div>
    </div>
  </aside>

  <!-- CONTENU PRINCIPAL -->
  <div class="flex-1 ml-64">
    <div class="max-w-6xl mx-auto px-8 py-8">
      
      <!-- En-tête -->
      <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
          <h1 class="text-2xl font-extrabold text-gray-900">📋 Toutes les commandes</h1>
          <span class="text-xs px-3 py-1.5 rounded-full font-bold bg-blue-100 text-blue-700" th:text="${#lists.size(commandes)} + ' commandes'"></span>
        </div>
      </div>

      <!-- Barre de filtres -->
      <div class="bg-white rounded-xl border border-gray-200 p-4 mb-6 shadow-sm">
        <form method="get" action="/admin/commandes" class="grid grid-cols-1 md:grid-cols-4 gap-4">
          
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Statut</label>
            <select name="statut" class="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm">
              <option value="all" th:selected="${statutFiltre == null or statutFiltre == 'all'}">Tous</option>
              <option value="EN_COURS" th:selected="${statutFiltre == 'EN_COURS'}">En cours</option>
              <option value="VALIDEE" th:selected="${statutFiltre == 'VALIDEE'}">Validée</option>
              <option value="ANNULEE" th:selected="${statutFiltre == 'ANNULEE'}">Annulée</option>
            </select>
          </div>
          
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Client</label>
            <input type="text" name="client" th:value="${clientFiltre}" placeholder="Nom ou email..."
                   class="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm">
          </div>
          
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Date min</label>
            <input type="date" name="dateMin" th:value="${dateMinFiltre}"
                   class="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm">
          </div>
          
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Date max</label>
            <input type="date" name="dateMax" th:value="${dateMaxFiltre}"
                   class="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm">
          </div>
          
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Montant min (MAD)</label>
            <input type="number" name="montantMin" th:value="${montantMinFiltre}" placeholder="0"
                   class="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm">
          </div>
          
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Montant max (MAD)</label>
            <input type="number" name="montantMax" th:value="${montantMaxFiltre}" placeholder="999999"
                   class="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm">
          </div>
          
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Trier par</label>
            <select name="sort" class="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm">
              <option value="date_desc" th:selected="${sortFiltre == null or sortFiltre == 'date_desc'}">Date (récent → ancien)</option>
              <option value="date_asc" th:selected="${sortFiltre == 'date_asc'}">Date (ancien → récent)</option>
              <option value="total_desc" th:selected="${sortFiltre == 'total_desc'}">Montant (plus élevé)</option>
              <option value="total_asc" th:selected="${sortFiltre == 'total_asc'}">Montant (plus faible)</option>
              <option value="client_asc" th:selected="${sortFiltre == 'client_asc'}">Client (A→Z)</option>
              <option value="client_desc" th:selected="${sortFiltre == 'client_desc'}">Client (Z→A)</option>
            </select>
          </div>
          
          <div class="flex items-end gap-2">
            <button type="submit" class="px-4 py-2 rounded-lg text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition-all">Filtrer</button>
            <a href="/admin/commandes" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 border border-gray-300 hover:bg-gray-50 text-center">Réinitialiser</a>
          </div>
        </form>
      </div>

      <!-- Flash -->
      <div th:if="${success}" class="mb-6 px-4 py-3 rounded-xl text-sm font-medium bg-green-50 text-green-700 border border-green-200" th:text="${success}"></div>

      <!-- Tableau des commandes -->
      <div class="rounded-2xl bg-white border border-gray-200 overflow-hidden shadow-sm">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-gray-50 border-b border-gray-200">
                <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">#</th>
                <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Client</th>
                <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Articles</th>
                <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Total</th>
                <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Statut</th>
                <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Date</th>
                <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Action</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="cmd : ${commandes}" class="border-b border-gray-100 hover:bg-gray-50 transition">
                <td class="px-5 py-3 font-bold text-blue-600" th:text="'#' + ${cmd.id}"></td>
                <td class="px-5 py-3">
                  <p class="font-semibold text-gray-900" th:text="${cmd.client.nomComplet}"></p>
                  <p class="text-xs text-gray-500" th:text="${cmd.client.email}"></p>
                </td>
                <td class="px-5 py-3">
                  <div class="flex flex-wrap gap-1">
                    <span th:each="ligne : ${cmd.lignes}" class="text-xs px-2 py-0.5 rounded-md bg-gray-100 text-gray-600"
                          th:text="${ligne.produit.nom} + ' ×' + ${ligne.quantite}"></span>
                  </div>
                </td>
                <td class="px-5 py-3 font-bold text-blue-600" th:text="${#numbers.formatDecimal(cmd.total,1,2)} + ' MAD'"></td>
                <td class="px-5 py-3">
                  <span class="px-2 py-1 rounded-full text-xs font-bold"
                        th:text="${cmd.statut}"
                        th:classappend="${cmd.statut.toString() == 'VALIDEE'} ? 'bg-green-100 text-green-700' : (${cmd.statut.toString() == 'ANNULEE'} ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700')">
                  </span>
                </td>
                <td class="px-5 py-3 text-xs text-gray-500" th:text="${#temporals.format(cmd.dateCommande, 'dd/MM/yyyy HH:mm')}"></td>
                <td class="px-5 py-3">
                  <form th:action="@{/admin/commandes/{id}/statut(id=${cmd.id})}" method="post" class="flex gap-2 items-center">
                    <select name="statut" class="px-2 py-1.5 rounded-lg border border-gray-300 text-xs outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white text-gray-700">
                      <option value="EN_COURS" th:selected="${cmd.statut.toString() == 'EN_COURS'}">EN COURS</option>
                      <option value="VALIDEE" th:selected="${cmd.statut.toString() == 'VALIDEE'}">VALIDÉE</option>
                      <option value="ANNULEE" th:selected="${cmd.statut.toString() == 'ANNULEE'}">ANNULÉE</option>
                    </select>
                    <button type="submit" class="px-3 py-1.5 rounded-lg text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 transition-all">✓</button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        
        <div th:if="${#lists.isEmpty(commandes)}" class="text-center py-12">
          <div class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
            </svg>
          </div>
          <p class="text-gray-500">Aucune commande ne correspond aux critères</p>
        </div>
      </div>
    </div>
  </div>
</main>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
