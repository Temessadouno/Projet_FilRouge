<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head th:replace="~{fragments/layout :: head}"></head>
<body style="background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif;">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="max-w-5xl mx-auto px-4 py-10">
  <div class="flex items-center gap-3 mb-6">
    <a th:href="@{/admin}" class="text-sm hover:opacity-70" style="color: var(--muted);">← Dashboard</a>
    <h1 class="text-2xl font-extrabold">👥 Gestion des clients</h1>
  </div>

  <!-- Flash -->
  <div th:if="${success}" class="flash-msg mb-4 px-4 py-3 rounded-xl text-sm"
       style="background: #dcfce7; color: #166534; border: 1px solid #86efac;" th:text="${success}"></div>

  <div class="rounded-2xl border overflow-hidden" style="background: var(--card); border-color: var(--border);">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-xs uppercase tracking-wider text-left"
            style="background: var(--badge); color: var(--muted);">
          <th class="px-5 py-3">#</th>
          <th class="px-5 py-3">Client</th>
          <th class="px-5 py-3">Email</th>
          <th class="px-5 py-3">Rôle</th>
          <th class="px-5 py-3">Statut</th>
          <th class="px-5 py-3">Inscription</th>
          <th class="px-5 py-3">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="client : ${clients}"
            class="border-t hover:opacity-90 transition" style="border-color: var(--border);">
          <td class="px-5 py-3 font-bold" style="color: var(--muted);" th:text="${client.id}"></td>
          <td class="px-5 py-3">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs text-black"
                   style="background: var(--accent);"
                   th:text="${client.prenom.substring(0,1).toUpperCase() + client.nom.substring(0,1).toUpperCase()}"></div>
              <span class="font-semibold" th:text="${client.nomComplet}"></span>
            </div>
          </td>
          <td class="px-5 py-3" style="color: var(--muted);" th:text="${client.email}"></td>
          <td class="px-5 py-3">
            <span class="text-xs px-2 py-1 rounded-full font-bold"
                  th:text="${client.role}"
                  th:style="${client.role.toString() == 'ADMIN' ? 'background: #fef3c7; color: #92400e;' : 'background: var(--badge); color: var(--muted);'}">
            </span>
          </td>
          <td class="px-5 py-3">
            <span th:if="${client.actif}"
                  class="text-xs px-2 py-1 rounded-full font-bold" style="background: #dcfce7; color: #166534;">Actif</span>
            <span th:unless="${client.actif}"
                  class="text-xs px-2 py-1 rounded-full font-bold" style="background: #fee2e2; color: #991b1b;">Bloqué</span>
          </td>
          <td class="px-5 py-3 text-xs" style="color: var(--muted);"
              th:text="${#temporals.format(client.createdAt,'dd/MM/yyyy')}"></td>
          <td class="px-5 py-3">
            <form th:action="@{/admin/clients/{id}/toggle(id=${client.id})}" method="post">
              <button type="submit"
                      class="px-3 py-1.5 rounded-lg text-xs font-medium transition hover:opacity-80"
                      th:text="${client.actif ? '🔒 Bloquer' : '🔓 Activer'}"
                      th:style="${client.actif ? 'background: #ef4444; color: #fff;' : 'background: #22c55e; color: #fff;'}">
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="px-5 py-3 border-t text-xs" style="border-color: var(--border); color: var(--muted);">
      <span th:text="${#lists.size(clients)} + ' client(s) au total'"></span>
    </div>
  </div>
</main>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
