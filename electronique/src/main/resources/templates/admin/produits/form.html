<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-gray-50 text-gray-900 font-['Inter',system-ui]">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex">
  
  <!-- ASIDE BARRE DE NAVIGATION ADMIN -->
  <aside class="w-64 min-h-screen bg-white border-r border-gray-200 fixed left-0 top-16 overflow-y-auto z-40">
    <div class="p-5">
      <div class="flex items-center gap-3 mb-8 pb-4 border-b border-gray-200">
        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center">
          <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <div>
          <p class="text-sm font-bold text-gray-900">Panel Admin</p>
          <p class="text-xs text-gray-500">Gestion complète</p>
        </div>
      </div>
      
      <nav class="space-y-1">
        <a th:href="@{/admin}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Tableau de bord
        </a>
        
        <a th:href="@{/admin/produits}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium bg-blue-50 text-blue-700 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
          </svg>
          Produits
        </a>
        
        <a th:href="@{/admin/categories}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
          </svg>
          Catégories
        </a>
        
        <a th:href="@{/admin/commandes}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
          </svg>
          Commandes
        </a>
        
        <a th:href="@{/admin/clients}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          Clients
        </a>
      </nav>
      
      <div class="mt-8 pt-4 border-t border-gray-200">
        <a th:href="@{/}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Retour au site
        </a>
      </div>
    </div>
  </aside>

  <!-- CONTENU PRINCIPAL -->
  <div class="flex-1 ml-64">
    <div class="max-w-3xl mx-auto px-8 py-8">
      
      <!-- En-tête -->
      <div class="flex items-center gap-3 mb-6">
        <a th:href="@{/admin/produits}" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-blue-600 transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Retour aux produits
        </a>
      </div>
      
      <div class="mb-6">
        <h1 class="text-2xl font-extrabold text-gray-900"
            th:text="${produit.id != null ? '✏️ Modifier le produit' : '➕ Nouveau produit'}"></h1>
        <p class="text-sm text-gray-500 mt-1"
            th:text="${produit.id != null ? 'Modifiez les informations du produit' : 'Ajoutez un nouveau produit au catalogue'}"></p>
      </div>

      <!-- Flash erreur -->
      <div th:if="${erreur}" 
           class="mb-6 px-4 py-3 rounded-xl text-sm font-medium bg-red-50 text-red-700 border border-red-200"
           th:text="${erreur}"></div>

      <!-- Formulaire avec upload d'image -->
      <div class="rounded-2xl bg-white border border-gray-200 p-6 shadow-sm">
        <!-- ⚠️ IMPORTANT: ajouter enctype="multipart/form-data" -->
        <form th:action="@{/admin/produits/sauvegarder}" method="post" enctype="multipart/form-data" class="flex flex-col gap-5">
          <input type="hidden" name="id" th:value="${produit.id}"/>
          <input type="hidden" name="deleted" th:value="${produit.deleted ?: false}"/>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <!-- Nom -->
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-2">Nom du produit <span class="text-red-500">*</span></label>
              <input type="text" name="nom" required th:value="${produit.nom}" placeholder="Nom du produit"
                     class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white text-gray-900 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"/>
            </div>
            
            <!-- Marque -->
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-2">Marque</label>
              <input type="text" name="marque" th:value="${produit.marque}" placeholder="Marque"
                     class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white text-gray-900 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"/>
            </div>
          </div>

          <!-- Description -->
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-2">Description</label>
            <textarea name="description" rows="4" th:text="${produit.description}" placeholder="Description du produit..."
                      class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white text-gray-900 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all resize-none"></textarea>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <!-- Prix -->
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-2">Prix (MAD) <span class="text-red-500">*</span></label>
              <input type="number" name="prix" required step="0.01" min="0" th:value="${produit.prix}" placeholder="0.00"
                     class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white text-gray-900 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"/>
            </div>
            
            <!-- Stock -->
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-2">Stock <span class="text-red-500">*</span></label>
              <input type="number" name="stock" required min="0" th:value="${produit.stock ?: 0}" placeholder="0"
                     class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white text-gray-900 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"/>
            </div>
          </div>

          <!-- Upload Image (remplace l'URL) -->
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-2">Image du produit</label>
            
            <!-- Aperçu de l'image actuelle -->
            <div th:if="${produit.imageUrl != null and produit.imageUrl != ''}" class="mb-3">
              <p class="text-xs text-gray-400 mb-1">Image actuelle :</p>
              <img th:src="@{${produit.imageUrl}}" th:alt="${produit.nom}" 
                   class="w-32 h-32 object-cover rounded-lg border border-gray-200"/>
            </div>
            
            <!-- Input file -->
            <input type="file" name="imageFile" accept="image/jpeg,image/png,image/jpg,image/webp"
                   class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white text-gray-900 text-sm file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all"/>
            <p class="text-xs text-gray-400 mt-1">Formats acceptés : JPG, PNG, WEBP. Max 5MB</p>
            <p class="text-xs text-gray-400">Laissez vide pour conserver l'image actuelle</p>
          </div>

          <!-- Catégorie -->
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-2">Catégorie <span class="text-red-500">*</span></label>
            <select name="categorie.id" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white text-gray-900 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all">
              <option value="">-- Choisir une catégorie --</option>
              <option th:each="cat : ${categories}"
                      th:value="${cat.id}"
                      th:text="${cat.nom}"
                      th:selected="${produit.categorie != null && produit.categorie.id == cat.id}"></option>
            </select>
          </div>

          <!-- Boutons -->
          <div class="flex gap-3 pt-4">
            <button type="submit"
                    class="flex-1 py-3 rounded-xl font-bold text-white text-sm bg-blue-600 hover:bg-blue-700 transition-all duration-200 shadow-sm">
              💾 Sauvegarder
            </button>
            <a th:href="@{/admin/produits}"
               class="flex-1 py-3 rounded-xl font-medium text-sm text-gray-600 border border-gray-300 hover:border-gray-400 hover:text-gray-800 text-center transition-all duration-200">
              Annuler
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
