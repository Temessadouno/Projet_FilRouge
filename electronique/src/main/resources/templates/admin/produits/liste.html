<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head th:replace="~{fragments/layout :: head}"></head>
<body style="background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif;">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="max-w-6xl mx-auto px-4 py-10">
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <a th:href="@{/admin}" class="text-sm hover:opacity-70" style="color: var(--muted);">← Dashboard</a>
      <h1 class="text-2xl font-extrabold">📦 Gestion des produits</h1>
    </div>
    <a th:href="@{/admin/produits/nouveau}"
       class="px-5 py-2.5 rounded-xl font-bold text-black text-sm transition hover:opacity-80"
       style="background: var(--accent);">+ Nouveau produit</a>
  </div>

  <!-- Flash -->
  <div th:if="${success}" class="flash-msg mb-4 px-4 py-3 rounded-xl text-sm font-medium"
       style="background: #dcfce7; color: #166534; border: 1px solid #86efac;" th:text="${success}"></div>

  <div class="rounded-2xl border overflow-hidden" style="background: var(--card); border-color: var(--border);">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-xs uppercase tracking-wider text-left"
            style="background: var(--badge); color: var(--muted);">
          <th class="px-5 py-3">Image</th>
          <th class="px-5 py-3">Nom</th>
          <th class="px-5 py-3">Catégorie</th>
          <th class="px-5 py-3">Prix</th>
          <th class="px-5 py-3">Stock</th>
          <th class="px-5 py-3">Statut</th>
          <th class="px-5 py-3">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="produit : ${produits}"
            class="border-t transition hover:opacity-90"
            style="border-color: var(--border);"
            th:classappend="${produit.deleted ? 'opacity-50' : ''}">
          <td class="px-5 py-3">
            <img th:src="${produit.imageUrl}" th:alt="${produit.nom}"
                 onerror="this.src='/images/placeholder.png'"
                 class="w-12 h-12 rounded-xl object-cover"/>
          </td>
          <td class="px-5 py-3">
            <p class="font-semibold" th:text="${produit.nom}"></p>
            <p class="text-xs" style="color: var(--muted);" th:text="${produit.marque}"></p>
          </td>
          <td class="px-5 py-3">
            <span class="text-xs px-2 py-1 rounded-full" style="background: var(--badge); color: var(--accent);"
                  th:text="${produit.categorie.nom}"></span>
          </td>
          <td class="px-5 py-3 font-bold" style="color: var(--accent);"
              th:text="${#numbers.formatDecimal(produit.prix,1,2)} + ' MAD'"></td>
          <td class="px-5 py-3">
            <span th:text="${produit.stock}"
                  class="font-bold text-base"
                  th:style="${produit.stock == 0 ? 'color: #ef4444' : (produit.stock < 5 ? 'color: #f59e0b' : 'color: #22c55e')}"></span>
          </td>
          <td class="px-5 py-3">
            <span th:unless="${produit.deleted}"
                  class="text-xs px-2 py-1 rounded-full font-bold" style="background: #dcfce7; color: #166534;">Actif</span>
            <span th:if="${produit.deleted}"
                  class="text-xs px-2 py-1 rounded-full font-bold" style="background: #fee2e2; color: #991b1b;">Supprimé</span>
          </td>
          <td class="px-5 py-3">
            <div class="flex gap-2">
              <a th:href="@{/admin/produits/editer/{id}(id=${produit.id})}"
                 class="px-3 py-1.5 rounded-lg border text-xs font-medium transition hover:opacity-70"
                 style="border-color: var(--border); color: var(--text);">✏️ Éditer</a>
              <form th:action="@{/admin/produits/supprimer/{id}(id=${produit.id})}" method="post"
                    th:unless="${produit.deleted}"
                    onsubmit="return confirm('Supprimer ce produit ?')">
                <button type="submit"
                        class="px-3 py-1.5 rounded-lg text-xs font-medium text-white transition hover:opacity-80"
                        style="background: #ef4444;">🗑 Suppr.</button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
