<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head th:replace="~{fragments/layout :: head}"></head>
<body style="background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif;">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="max-w-5xl mx-auto px-4 py-10">
  <h1 class="text-3xl font-extrabold mb-8">✓ Confirmer la commande</h1>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    
    <!-- Récapitulatif -->
    <div class="rounded-2xl border overflow-hidden" style="background: var(--card); border-color: var(--border);">
      <div class="px-5 py-4 border-b font-bold text-base" style="border-color: var(--border); background: var(--badge);">
        📋 Récapitulatif de la commande
      </div>

      <div class="divide-y" style="border-color: var(--border);">
        <div th:each="item : ${items}" class="flex items-center gap-3 px-5 py-3">

          <img th:src="${item.produit.imageUrl}" th:alt="${item.produit.nom}"
               onerror="this.src='/images/placeholder.png'"
               class="w-12 h-12 rounded-xl object-cover"/>

          <div class="flex-1">
            <p class="text-sm font-semibold" th:text="${item.produit.nom}"></p>

            <p class="text-xs" style="color: var(--muted);"
               th:text="'x' + ${item.quantite} + ' × ' + ${#numbers.formatDecimal(item.produit.prix,1,2)} + ' MAD'">
            </p>
          </div>

          <!-- ✅ CORRECTION ICI -->
          <span class="font-bold text-sm" style="color: var(--accent);"
                th:text="${#numbers.formatDecimal(
                  item.produit.prix.multiply(
                    T(java.math.BigDecimal).valueOf(item.quantite.doubleValue())
                  ),1,2)} + ' MAD'">
          </span>

        </div>
      </div>

      <div class="flex justify-between items-center px-5 py-4 border-t font-extrabold text-lg"
           style="border-color: var(--border); background: var(--badge);">
        <span>Total</span>
        <span style="color: var(--accent);" th:text="${#numbers.formatDecimal(total,1,2)} + ' MAD'"></span>
      </div>
    </div>

    <!-- Formulaire livraison -->
    <div class="rounded-2xl border" style="background: var(--card); border-color: var(--border);">
      <div class="px-5 py-4 border-b font-bold text-base" style="border-color: var(--border); background: var(--badge);">
        📍 Adresse de livraison
      </div>

      <form th:action="@{/commande/passer}" method="post" class="p-5 flex flex-col gap-4">
        
        <div>
          <p class="text-sm mb-2" style="color: var(--muted);">
            Livraison pour :
            <strong th:text="${client.nomComplet}" style="color: var(--text);"></strong>
          </p>

          <textarea name="adresse" rows="5" required
                    th:text="${client.adresseLivraison}"
                    placeholder="Numéro, rue, ville, code postal..."
                    class="w-full px-4 py-3 rounded-xl border text-sm outline-none resize-none focus:ring-2 transition"
                    style="background: var(--input); border-color: var(--border); color: var(--text);">
          </textarea>
        </div>

        <button type="submit"
                class="w-full py-3 rounded-xl font-bold text-black text-base transition hover:opacity-80 hover:scale-[1.01]"
                style="background: var(--accent);">
          ✓ Valider la commande
        </button>

        <a th:href="@{/panier}" class="text-center text-sm hover:opacity-70 transition"
           style="color: var(--muted);">
           ← Retour au panier
        </a>

      </form>
    </div>

  </div>
</main>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
