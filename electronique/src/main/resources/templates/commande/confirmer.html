<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-white text-gray-900 font-['Inter',system-ui]">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  
  <!-- En-tête -->
  <div class="mb-8">
    <div class="flex items-center gap-3 mb-2">
      <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center">
        <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tight text-gray-900">Confirmer la commande</h1>
    </div>
    <p class="text-sm text-gray-500 ml-13">Vérifiez vos informations avant de valider</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    
    <!-- ======================================================== -->
    <!-- COLONNE GAUCHE : Récapitulatif des produits -->
    <!-- ======================================================== -->
    <div class="rounded-2xl border border-gray-200 bg-white overflow-hidden shadow-sm">
      <div class="px-5 py-4 border-b border-gray-100 bg-gray-50">
        <h2 class="font-bold text-gray-900 flex items-center gap-2">
          <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          Récapitulatif de la commande
        </h2>
      </div>

      <!-- Liste des produits -->
      <div class="divide-y divide-gray-100">
        <div th:each="item : ${items}" class="flex items-center gap-4 px-5 py-4">
          
          <!-- Image -->
          <img th:src="${item.produit.imageUrl}" 
               th:alt="${item.produit.nom}"
               onerror="this.src='/images/placeholder.png'"
               class="w-14 h-14 rounded-xl object-cover bg-gray-100"/>

          <!-- Infos produit -->
          <div class="flex-1">
            <p class="text-sm font-semibold text-gray-900" th:text="${item.produit.nom}"></p>
            <p class="text-xs text-gray-500 mt-0.5"
               th:text="'Quantité : ' + ${item.quantite} + ' × ' + ${#numbers.formatDecimal(item.produit.prix,1,2)} + ' MAD'">
            </p>
          </div>

          <!-- Sous-total -->
          <span class="font-bold text-sm text-blue-600"
                th:text="${#numbers.formatDecimal(item.produit.prix * item.quantite,1,2)} + ' MAD'">
          </span>
        </div>
      </div>

      <!-- Total -->
      <div class="flex justify-between items-center px-5 py-4 border-t border-gray-200 bg-gray-50">
        <span class="font-extrabold text-gray-900">Total</span>
        <span class="text-xl font-extrabold text-blue-600" th:text="${#numbers.formatDecimal(total,1,2)} + ' MAD'"></span>
      </div>
    </div>

    <!-- ======================================================== -->
    <!-- COLONNE DROITE : Formulaire de livraison -->
    <!-- ======================================================== -->
    <div class="rounded-2xl border border-gray-200 bg-white overflow-hidden shadow-sm">
      <div class="px-5 py-4 border-b border-gray-100 bg-gray-50">
        <h2 class="font-bold text-gray-900 flex items-center gap-2">
          <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Adresse de livraison
        </h2>
      </div>

      <form th:action="@{/commande/passer}" method="post" class="p-5 flex flex-col gap-5">
        
        <!-- Informations client -->
        <div class="p-4 rounded-xl bg-gray-50 border border-gray-100">
          <p class="text-xs text-gray-500 mb-1">Livraison pour :</p>
          <p class="text-sm font-semibold text-gray-900" th:text="${client.nomComplet}"></p>
          <p class="text-xs text-gray-500 mt-1" th:text="${client.email}"></p>
        </div>

        <!-- Champ adresse -->
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-2 flex items-center gap-1">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            Adresse de livraison
          </label>
          <textarea name="adresse" 
                    rows="4" 
                    required
                    th:text="${client.adresseLivraison}"
                    placeholder="Numéro, rue, ville, code postal..."
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white text-gray-900 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all resize-none"></textarea>
        </div>

        <!-- Bouton validation -->
        <button type="submit"
                class="w-full py-3 rounded-xl font-bold text-white text-base bg-blue-600 hover:bg-blue-700 hover:scale-[1.01] transition-all duration-200 shadow-sm flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          Valider la commande
        </button>

        <!-- Lien retour panier -->
        <a th:href="@{/panier}" 
           class="text-center text-sm text-gray-500 hover:text-blue-600 transition-colors duration-200 flex items-center justify-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Retour au panier
        </a>

        <!-- CSRF Token -->
		<th:block th:if="${_csrf != null}">
		    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		</th:block>
		<th:block th:unless="${_csrf != null}">
		    <!-- Fallback : champ CSRF standard -->
		    <input type="hidden" name="_csrf" value=""/>
		</th:block>
      </form>
    </div>
  </div>
</main>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
