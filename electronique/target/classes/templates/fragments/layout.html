<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${pageTitle ?: 'NUALI-E'}">NUALI-E</title>
  <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#2563eb', dark: '#1d4ed8', light: '#3b82f6' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          animation: {
            'bounce-slow': 'bounce 1s ease-in-out',
            'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'glow': 'glow 2s ease-in-out infinite'
          },
          keyframes: {
            glow: {
              '0%, 100%': { boxShadow: '0 0 5px rgba(59,130,246,0.3)' },
              '50%': { boxShadow: '0 0 20px rgba(59,130,246,0.6)' }
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f9fafb;
      --card: #ffffff;
      --nav: #ffffff;
      --border: #e5e7eb;
      --border2: #d1d5db;
      --input: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-light: #3b82f6;
    }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }
    .nav-icon-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .nav-icon-btn:hover {
      transform: translateY(-2px);
    }
    .nav-icon-btn:active {
      transform: translateY(0px);
    }
    .badge-pulse {
      animation: badgePulse 2s ease-in-out infinite;
    }
    @keyframes badgePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); background: #3b82f6; }
    }
    .mobile-menu-open {
      overflow: hidden;
    }
  </style>
</head>

<body>
<!-- NAVBAR FRAGMENT -->
<nav th:fragment="navbar" class="sticky top-0 z-50 bg-white shadow-sm border-b border-gray-200">
  <div class="max-w-full  px-1 sm:px-1 lg:px-1">
    <div class="flex items-center justify-between h-16">
      
      <!-- Logo - Gauche -->
      <div class="flex items-center gap-8">
		<a th:href="@{/}" class="flex items-center gap-2.5 group">
		  
		  <!-- LOGO -->
		  <img th:src="@{/images/logo.png}" 
		       alt="Logo"
		       class="ml-10 rounded-full bg-white bourder-2 border-green-600 w-20 h-20 object-contain">
		
		</a>

        <!-- Navigation Links - Desktop -->
        <div class="hidden md:flex items-center gap-1">
          <!-- Admin panel - visible seulement si ADMIN (via session) -->
          <div th:if="${session.userRole != null and session.userRole == 'ADMIN'}">
            <a th:href="@{/admin}"
               class="nav-icon-btn px-4 py-2 rounded-lg text-sm font-medium transition-all text-gray-600 hover:text-gray-900 hover:bg-gray-100">
              <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              Dashboard
            </a>
          </div>
        </div>
      </div>

      <!-- Actions - Droite -->
      <div class="flex items-end gap-2 ">
        
        <!-- Panier - visible seulement si CLIENT (via session) -->
        <div th:if="${session.userRole != null and session.userRole == 'CLIENT'}">
          <a th:href="@{/panier}" 
             class="nav-icon-btn relative p-2.5 rounded-xl transition-all text-gray-600 hover:text-gray-900 hover:bg-gray-100">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
            </svg>
            <span th:text="${session.nombreArticles != null ? session.nombreArticles : 0}"
                  class="absolute -top-1 -right-1 flex items-center justify-center w-5 h-5 text-[10px] font-bold rounded-full badge-pulse bg-blue-600 text-white">0</span>
          </a>
        </div>

        <!-- ======================================================== -->
        <!-- UTILISATEUR CONNECTÉ (CLIENT ou ADMIN) - via session -->
        <!-- ======================================================== -->
        <div th:if="${session.estConnecter == true}">
          <div class="relative group ">
            <button class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 transition-all">
              <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center">
                <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
              </div>

              <svg class="w-4 h-4 text-gray-400 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>
            
            <!-- Menu déroulant -->
            <div class="absolute right-0 mt-2 w-56 rounded-lg shadow-lg bg-white border border-gray-200 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
              <div class="py-2">
                <!-- Mon profil -->
                <a th:href="@{/profile}" class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 transition-colors">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                <div class="text-left">
                <p class="text-xs font-semibold text-gray-900" th:text="${session.userPrenom != null ? session.userPrenom + ' ' + session.userNom : 'Utilisateur'}"></p>
                <p class="text-xs text-gray-500" th:text="${session.userRole != null ? session.userRole : ''}"></p>
              </div>
                </a>
                
                <!-- Mes commandes - visible seulement pour CLIENT -->
                <div th:if="${session.userRole == 'CLIENT'}">
                  <a th:href="@{/commande/mes-commandes}" class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                    Mes commandes
                  </a>
                </div>
                
                <!-- Admin panel - visible seulement pour ADMIN -->
                <div th:if="${session.userRole == 'ADMIN'}">
                  <a th:href="@{/admin}" class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
                    Dashboard
                  </a>
                </div>
                
                <div class="border-t border-gray-100 my-1"></div>
                
                <!-- Déconnexion -->
                <form th:action="@{/auth/logout}" method="post">
                  <button type="submit" class="flex items-center gap-3 w-full px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors text-left">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Déconnexion
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>

        <!-- ======================================================== -->
        <!-- UTILISATEUR NON CONNECTÉ - via session -->
        <!-- ======================================================== -->
        <div th:if="${session.estConnecter == null or session.estConnecter == false}">
          <div class="flex gap-2">
            <a th:href="@{/auth/login}" 
               class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition-all">
              Connexion
            </a>
            <a th:href="@{/auth/register}"
               class="px-4 py-2 rounded-lg text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 transition-all shadow-sm">
              Inscription
            </a>
          </div>
        </div>

        <!-- Menu mobile (hamburger) -->
        <button id="mobileMenuBtn" class="md:hidden p-2 rounded-lg text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition-all">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Menu Mobile -->
    <div id="mobileMenu" class="hidden md:hidden py-4 border-t border-gray-200">
      <div class="flex flex-col gap-2">
        
        <!-- Admin dans menu mobile -->
        <div th:if="${session.userRole == 'ADMIN'}">
          <a th:href="@{/admin}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-100">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
            Admin
          </a>
        </div>
        
        <!-- Panier dans menu mobile (Client uniquement) -->
        <div th:if="${session.userRole == 'CLIENT'}">
          <a th:href="@{/panier}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-100">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            Mon panier
          </a>
        </div>
        
        <!-- Connexion/Inscription menu mobile (non connecté) -->
        <div th:if="${session.estConnecter == null or session.estConnecter == false}">
          <a th:href="@{/auth/login}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-100">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
            Connexion
          </a>
          <a th:href="@{/auth/register}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white bg-blue-600">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
            Inscription
          </a>
        </div>
        
        <!-- Déconnexion menu mobile (connecté) -->
        <div th:if="${session.estConnecter == true}">
          <form th:action="@{/auth/logout}" method="post">
            <button type="submit" class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-sm text-red-600 hover:bg-red-50">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
              Déconnexion
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- ============================================================ -->
<!-- FOOTER FRAGMENT -->
<!-- ============================================================ -->
<footer th:fragment="footer" class="border-t border-gray-200 bg-gray-50 mt-auto">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-blue-500"></span>
        <span class="text-sm font-bold text-gray-900">NUALI-ELECTRONIQUE</span>
      </div>
      <p class="text-xs text-gray-500">© 2026 NUALI-ELECTRONIQUE · Projet Fil Rouge</p>
      <div class="flex gap-5 text-xs text-gray-500">
        <a th:href="@{/auth/login}" class="hover:text-blue-600 transition-colors duration-200">Connexion</a>
        <a th:href="@{/auth/register}" class="hover:text-blue-600 transition-colors duration-200">Inscription</a>
      </div>
    </div>
  </div>
</footer>

<script>
  // Mobile menu toggle
  const mobileBtn = document.getElementById('mobileMenuBtn');
  const mobileMenu = document.getElementById('mobileMenu');
  
  if (mobileBtn && mobileMenu) {
    mobileBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
    });
  }
</script>
</body>
</html>
