<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="min-h-screen flex flex-col bg-white text-gray-900 font-['Inter',system-ui]">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-8xl mx-auto">

    <div class="flex flex-col lg:flex-row gap-8 mx-8">
      
      <!-- COLONNE DROITE : FORMULAIRE MOT DE PASSE OUBLIÉ / RÉINITIALISATION -->
      <div class="lg:w-1/2">
        
        <div class="text-center mb-6">
          <a href="/" class="text-3xl font-extrabold tracking-tight text-gray-900">
            NUALI-<span class="text-blue-600">Mot de passe oublié</span>
          </a>
          <p class="text-sm mt-2 text-gray-500">Réinitialisez votre mot de passe</p>
        </div>

        <div class="rounded-2xl border border-gray-200 bg-white p-6 md:p-8 shadow-sm m-8">
          
          <div th:if="${erreur}" 
               class="mb-6 px-4 py-3 rounded-xl text-sm font-medium bg-red-50 text-red-700 border border-red-200"
               th:text="${erreur}"></div>
          <div th:if="${message}" 
               class="mb-6 px-4 py-3 rounded-xl text-sm font-medium bg-green-50 text-green-700 border border-green-200"
               th:text="${message}"></div>

          <!-- Formulaire de vérification email (visible si showResetForm == false) -->
          <div th:if="${!showResetForm}">
            <h1 class="text-2xl font-bold mb-6 text-center text-gray-900">Mot de passe oublié</h1>
            <p class="text-sm text-gray-500 text-center mb-6">
              Entrez votre adresse email pour vérifier votre compte.
            </p>

            <form th:action="@{/auth/forgot-password}" method="post" class="flex flex-col gap-6">
              <div>
                <label class="block text-xs font-semibold mb-2 uppercase tracking-wide text-gray-500">
                  Adresse email
                </label>
                <input type="email" 
                       name="email" 
                       required 
                       autocomplete="email"
                       placeholder="exemple@email.com" 
                       autofocus
                       class="w-full px-4 py-3.5 rounded-xl border border-gray-300 bg-white text-gray-900 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all duration-200 placeholder:text-gray-400"/>
              </div>

              <button type="submit"
                      class="w-full py-3.5 rounded-xl font-bold text-white text-base mt-2 bg-blue-600 hover:bg-blue-700 hover:scale-[1.01] transition-all duration-200 shadow-sm">
                Vérifier mon email →
              </button>
            </form>
          </div>

          <!-- Formulaire de réinitialisation (visible si showResetForm == true) -->
          <div th:if="${showResetForm}">
            <h1 class="text-2xl font-bold mb-6 text-center text-gray-900">Nouveau mot de passe</h1>
            <p class="text-sm text-gray-500 text-center mb-6">
              Choisissez un nouveau mot de passe pour <strong th:text="${email}"></strong>
            </p>

            <form th:action="@{/auth/reset-password-direct}" method="post" class="flex flex-col gap-6">
              <input type="hidden" name="token" th:value="${token}"/>
              <input type="hidden" name="email" th:value="${email}"/>
              
              <div>
                <label class="block text-xs font-semibold mb-2 uppercase tracking-wide text-gray-500">
                  Nouveau mot de passe
                </label>
                <div class="relative">
                  <input type="password" 
                         id="password"
                         name="motDePasse" 
                         required 
                         minlength="6"
                         placeholder="6 caractères minimum"
                         class="w-full px-4 py-3.5 pr-12 rounded-xl border border-gray-300 bg-white text-gray-900 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all duration-200 placeholder:text-gray-400"/>
                  <button type="button" 
                          onclick="togglePassword('password', 'eye1')"
                          class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                    <svg id="eye1" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                      <circle cx="12" cy="12" r="3"/>
                    </svg>
                  </button>
                </div>
                <p class="text-xs text-gray-400 mt-1">✓ Minimum 6 caractères</p>
              </div>

              <div>
                <label class="block text-xs font-semibold mb-2 uppercase tracking-wide text-gray-500">
                  Confirmer le mot de passe
                </label>
                <div class="relative">
                  <input type="password" 
                         id="confirmPassword"
                         required 
                         placeholder="Retapez votre mot de passe"
                         class="w-full px-4 py-3.5 pr-12 rounded-xl border border-gray-300 bg-white text-gray-900 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all duration-200 placeholder:text-gray-400"/>
                  <button type="button" 
                          onclick="togglePassword('confirmPassword', 'eye2')"
                          class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                    <svg id="eye2" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                      <circle cx="12" cy="12" r="3"/>
                    </svg>
                  </button>
                </div>
                <p id="confirmError" class="text-xs text-red-500 mt-1 hidden">⚠️ Les mots de passe ne correspondent pas</p>
              </div>

              <button type="submit" id="submitBtn"
                      class="w-full py-3.5 rounded-xl font-bold text-white text-base mt-2 bg-blue-600 hover:bg-blue-700 hover:scale-[1.01] transition-all duration-200 shadow-sm">
                Réinitialiser mon mot de passe →
              </button>
            </form>
          </div>

          <p class="text-center text-sm mt-6 text-gray-500">
            <a th:href="@{/auth/login}" 
               class="font-semibold text-blue-600 hover:text-blue-700 hover:underline transition-colors">
              ← Retour à la connexion
            </a>
          </p>
        </div>
      </div>
      
      <!-- COLONNE GAUCHE : PUBLICITÉS -->
      <div class="lg:w-1/2">
        <div th:replace="~{fragments/ads :: ads-sidebar}"></div>
      </div>
    </div>

  </div>
</main>

<script>
  function togglePassword(inputId, eyeId) {
    const input = document.getElementById(inputId);
    const eye = document.getElementById(eyeId);
    
    if (input.type === 'password') {
      input.type = 'text';
      eye.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      input.type = 'password';
      eye.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  document.getElementById('submitBtn')?.addEventListener('click', function(e) {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    const errorSpan = document.getElementById('confirmError');
    
    if (password !== confirm) {
      e.preventDefault();
      errorSpan.classList.remove('hidden');
    } else if (password.length < 6) {
      e.preventDefault();
      alert('Le mot de passe doit contenir au moins 6 caractères');
    } else {
      errorSpan.classList.add('hidden');
    }
  });
  
  document.getElementById('confirmPassword')?.addEventListener('input', function() {
    const password = document.getElementById('password').value;
    if (password === this.value) {
      document.getElementById('confirmError')?.classList.add('hidden');
    }
  });
</script>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
